<!-- Prayer Request Section -->
<section id="prayer" class="prayer-section">
    <div class="container">
        <h2>Prayer Requests</h2>
        <p class="section-intro">Submit your prayer request and let our community lift you up in prayer. We believe in the power of prayer!</p>
        
        <div class="prayer-container">
            <form action="https://formspree.io/f/xbdpavwb" method="POST" class="prayer-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" name="name" id="name" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="message">Your Prayer Request</label>
                    <textarea name="message" id="message" rows="6" required placeholder="Please share what you would like us to pray about..."></textarea>
                </div>

                <div class="form-group">
                    <label for="category">Prayer Category (Optional)</label>
                    <select name="category" id="category">
                        <option value="">Select a category...</option>
                        <option value="health">Health & Healing</option>
                        <option value="family">Family</option>
                        <option value="work">Work & Career</option>
                        <option value="spiritual">Spiritual Growth</option>
                        <option value="financial">Financial</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Submit Prayer Request</button>
                <p class="form-note">Your prayer request will be shared with our prayer team and community.</p>
            </form>
        </div>
    </div>
</section>
