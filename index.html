<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body of Christ Ministries</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="path/to/logo.png" alt="Logo" style="width: 100px; height: auto;">
        <h1>Welcome to Body of Christ Ministries</h1>
    </header>
    <section id="prayer-request">
        <h2>Prayer Request</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="request">Prayer Request:</label>
            <textarea id="request" name="request" required></textarea>
            <button type="submit">Submit Prayer Request</button>
        </form>
    </section>
    <section id="donation">
        <h2>Support Our Ministry</h2>
        <button onclick="window.location.href='https://www.paypal.com/donate'">Donate via PayPal</button>
    </section>
    <footer>
        <p>&copy; 2026 Body of Christ Ministries</p>
    </footer>
</body>
</html>
