<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Body of Christ Ministries</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <a href="index.html"><img src="logo.jpg" alt="Body of Christ Ministries" class="logo-img"></a>
      </div>
      <nav class="nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="events.html" aria-current="page">Events</a>
        <a href="index.html#schedule">Service Times</a>
        <a href="index.html#prayer">Prayer Request</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <!-- EVENTS -->
  <section class="events-hero">
    <div class="container">
      <h1>Upcoming Events</h1>
      <p>Stay connected with what&rsquo;s happening at Body of Christ Ministries.</p>
    </div>
  </section>

  <section class="events-list">
    <div class="container">
      <div id="events-grid" class="events-grid">
        <!-- Events are loaded from data/events.json -->
        <p class="events-loading">Loading events&hellip;</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Body of Christ Ministries</p>
      <p>Council Bluffs, IA &amp; Omaha, NE</p>
    </div>
  </footer>

  <script>
    // Format date: "2026-04-05" → "Sunday, April 5, 2026"
    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split('-').map(Number);
      const date = new Date(year, month - 1, day);
      return date.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    // Check if event is in the past
    function isPast(dateStr) {
      const [year, month, day] = dateStr.split('-').map(Number);
      const eventDate = new Date(year, month - 1, day);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return eventDate < today;
    }

    fetch('data/events.json')
      .then(res => res.json())
      .then(events => {
        const grid = document.getElementById('events-grid');

        // Sort by date
        events.sort((a, b) => a.date.localeCompare(b.date));

        if (events.length === 0) {
          grid.innerHTML = '<p class="events-empty">No upcoming events at this time. Check back soon!</p>';
          return;
        }

        grid.innerHTML = events.map(event => {
          const past = isPast(event.date);
          return `
            <div class="event-card${past ? ' event-card--past' : ''}">
              <div class="event-date-badge">
                <span class="event-month">${new Date(event.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short' })}</span>
                <span class="event-day">${new Date(event.date + 'T00:00:00').getDate()}</span>
              </div>
              <div class="event-details">
                <h3>${event.title}${past ? ' <span class="event-past-label">Past</span>' : ''}</h3>
                <p class="event-meta">
                  <span>&#128197; ${formatDate(event.date)}</span>
                  <span>&#128336; ${event.time}</span>
                </p>
                <p class="event-location">&#128205; ${event.location}</p>
                ${event.description ? `<p class="event-desc">${event.description}</p>` : ''}
              </div>
            </div>
          `;
        }).join('');
      })
      .catch(() => {
        document.getElementById('events-grid').innerHTML =
          '<p class="events-empty">Unable to load events. Please try again later.</p>';
      });
  </script>

</body>
</html>
